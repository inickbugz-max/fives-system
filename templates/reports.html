<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Fives System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">Fives System</a>
            <div class="collapse navbar-collapse">
                                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/bookings">Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" href="/league">League</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/reports">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/analytics">Analytics</a></li>
                    <li class="nav-item"><a class="nav-link" href="/cash">Cash</a></li>
                    <li class="nav-item"><a class="nav-link" href="/staff">Staff</a></li>
                    <li class="nav-item"><a class="nav-link" href="/staff/reports">Staff Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/referee/reports">Referee Reports</a></li>
                </ul>
                <div class="d-flex">
                    <span class="navbar-text me-3">Welcome, {{ user }}</span>
                    <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Export Data</h5>
                    </div>
                    <div class="card-body">
                        <a href="/export/bookings" class="btn btn-success">Download Bookings CSV</a>
                        <button class="btn btn-secondary" onclick="window.print()">Print This Page</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Monthly Summary</h5>
                    </div>
                    <div class="card-body" id="monthly-summary">
                        Loading...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('/api/monthly-summary')
            .then(response => response.json())
            .then(data => {
                let html = '<table class="table table-sm">';
                html += '<thead><tr><th>Month</th><th>Bookings</th><th>Total Amount</th><th>Paid</th></tr></thead><tbody>';
                data.forEach(row => {
                    html += `<tr><td>${row.month}</td><td>${row.count}</td><td>R${row.total}</td><td>R${row.paid}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('monthly-summary').innerHTML = html;
            })
            .catch(() => document.getElementById('monthly-summary').innerHTML = '<p class="text-danger">Error loading data.</p>');
    </script>
</body>
</html>
