<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Fives System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">Fives System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/bookings">Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" href="/league">League</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports">Reports</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/analytics">Analytics</a></li>
                </ul>
                <div class="d-flex">
                    <span class="navbar-text me-3">Welcome, {{ user }}</span>
                    <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow h-100">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Daily Revenue (Last 30 Days)</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="dailyChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow h-100">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Weekly Revenue (Last 12 Weeks)</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="weeklyChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow h-100">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Payment Methods</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="methodChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('/api/analytics-data')
            .then(response => response.json())
            .then(data => {
                new Chart(document.getElementById('dailyChart'), {
                    type: 'line',
                    data: {
                        labels: data.daily.map(d => d.date),
                        datasets: [{ label: 'Revenue (R)', data: data.daily.map(d => d.revenue), borderColor: 'blue', fill: false }]
                    }
                });
                new Chart(document.getElementById('weeklyChart'), {
                    type: 'bar',
                    data: {
                        labels: data.weekly.map(w => w.week),
                        datasets: [{ label: 'Revenue (R)', data: data.weekly.map(w => w.revenue), backgroundColor: 'green' }]
                    }
                });
                new Chart(document.getElementById('methodChart'), {
                    type: 'pie',
                    data: {
                        labels: data.methods.map(m => m.method),
                        datasets: [{ data: data.methods.map(m => m.total), backgroundColor: ['#ff6384', '#36a2eb', '#ffce56'] }]
                    }
                });
            })
            .catch(err => console.error(err));
    </script>
</body>
</html>
