<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box {
            background:#1e293b;
            padding:30px;
            border-radius:10px;
            text-align:center;
        }

        input {
            padding:10px;
            width:200px;
            margin:10px;
        }

        button {
            padding:10px 20px;
            background:#22c55e;
            border:none;
            color:white;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔐 Login</h2>

    <form method="POST">
        <input name="username" placeholder="Enter your name" required>
        <br>
        <button type="submit">Enter</button>
    </form>
</div>

</body>
</html>
