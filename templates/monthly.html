<!DOCTYPE html>
<html>
<head>
    <title>Booking Board</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        form {
            margin: 20px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 90%;
        }

        th, td {
            padding: 15px;
            border: 1px solid #333;
        }

        th {
            background: #1e293b;
        }

        td {
            background: #020617;
        }

        .booked {
            background: #22c55e;
        }

        .empty {
            background: #1e293b;
        }
    </style>
</head>

<body>

<h1>📅 Booking Board</h1>

{% if message %}
<p>{{ message }}</p>
{% endif %}

<!-- BOOKING FORM -->
<form method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="date" name="date" required>
    <input type="time" name="time" required>
    <button type="submit">Book</button>
</form>

<!-- BOOKING GRID -->
<table>
    <tr>
        <th>Time</th>
        <th>Court 1</th>
        <th>Court 2</th>
        <th>Court 3</th>
    </tr>

    {% for time, courts in grid.items() %}
    <tr>
        <td>{{ time }}</td>

        <td class="{{ 'booked' if courts[1] else 'empty' }}">
            {{ courts[1] if courts[1] else "-" }}
        </td>

        <td class="{{ 'booked' if courts[2] else 'empty' }}">
            {{ courts[2] if courts[2] else "-" }}
        </td>

        <td class="{{ 'booked' if courts[3] else 'empty' }}">
            {{ courts[3] if courts[3] else "-" }}
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
