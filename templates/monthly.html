<!DOCTYPE html>
<html>
<head>
    <title>Monthly Bookings</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        .delete-btn {
            background: red;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        .message {
            margin-top: 10px;
            font-weight: bold;
            color: yellow;
        }
    </style>
</head>

<body>

<h1>📅 Monthly Bookings</h1>

<!-- ✅ MESSAGE -->
{% if message %}
    <div class="message">{{ message }}</div>
{% endif %}

<!-- ✅ FORM -->
<form method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="date" name="date" required>
    <input type="time" name="time" required>
    <button type="submit">Add Booking</button>
</form>

<!-- ✅ TABLE -->
<table>
    <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time</th>
        <th>Court</th>
        <th>Action</th>
    </tr>

    {% for booking in bookings %}
    <tr>
        <td>{{ booking.name }}</td>
        <td>{{ booking.date }}</td>
        <td>{{ booking.time }}</td>
        <td>🏟 Court {{ booking.court }}</td>
        <td>
            <a href="/delete/{{ booking.id }}">
                <button class="delete-btn">Delete</button>
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
