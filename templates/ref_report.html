<!DOCTYPE html>
<html>
<head>
<title>Ref Report</title>
<style>
body { background:#0f172a; color:white; font-family:Arial; padding:20px; }
.card { background:#1e293b; padding:15px; margin-bottom:10px; border-radius:8px; }
</style>
</head>

<body>

<h2>👨‍⚖️ Referee Report</h2>
<a href="/">⬅ Back</a>

{% for ref, months in report.items() %}
<div class="card">
    <h3>{{ ref }}</h3>

    {% for m, count in months.items() %}
        <p>{{ m }} : {{ count }} games</p>
    {% endfor %}
</div>
{% endfor %}

</body>
</html>
